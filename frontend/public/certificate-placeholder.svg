<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#304B60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D48161;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="300" fill="url(#grad1)"/>
  
  <!-- Border -->
  <rect x="20" y="20" width="360" height="260" fill="none" stroke="#E3DAD1" stroke-width="3" rx="10"/>
  <rect x="30" y="30" width="340" height="240" fill="none" stroke="#E3DAD1" stroke-width="1" rx="8"/>
  
  <!-- Logo/Icon -->
  <circle cx="200" cy="100" r="40" fill="#E3DAD1" opacity="0.3"/>
  <path d="M 200 70 L 200 130 M 170 100 L 230 100" stroke="#E3DAD1" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Text -->
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="24" fill="#E3DAD1" text-anchor="middle" font-weight="bold">
    شهادة
  </text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="16" fill="#E3DAD1" text-anchor="middle" opacity="0.8">
    Certificate
  </text>
  
  <!-- Decorative elements -->
  <circle cx="60" cy="60" r="5" fill="#E3DAD1" opacity="0.5"/>
  <circle cx="340" cy="60" r="5" fill="#E3DAD1" opacity="0.5"/>
  <circle cx="60" cy="240" r="5" fill="#E3DAD1" opacity="0.5"/>
  <circle cx="340" cy="240" r="5" fill="#E3DAD1" opacity="0.5"/>
</svg>
